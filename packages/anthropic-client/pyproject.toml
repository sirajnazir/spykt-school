[project]
name = "spykt-anthropic-client"
version = "0.0.1"
description = "Shared Anthropic client with mandatory middlewares (01-TECH_SPEC §4.1): refusal fallback, thinking config, budget guard, retention gate"
requires-python = ">=3.12"
dependencies = [
    "pyyaml>=6.0",
    "anthropic>=0.40",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["spykt_anthropic_client"]
