[project]
name = "spykt-notify"
version = "0.0.1"
description = "Push (OneSignal) + SMS (Twilio) notification clients behind Protocols, with per-role notification budgets (02-UIUX §0.3)"
requires-python = ">=3.12"
dependencies = [
    "httpx>=0.27",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["spykt_notify"]
