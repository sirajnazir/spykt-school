[project]
name = "spykt-audit"
version = "0.0.1"
description = "Append-only audit log writer (01-TECH_SPEC §3, PRD §7.5): every agent action carries {agent, model, prompt_version, autonomy_level, human_approver?}"
requires-python = ">=3.12"
dependencies = [
    "psycopg[binary]>=3.1",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["spykt_audit"]
