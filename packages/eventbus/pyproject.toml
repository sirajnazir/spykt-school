[project]
name = "spykt-eventbus"
version = "0.0.1"
description = "Event bus on Redis Streams + idempotency (01-TECH_SPEC §2): per-student ordering, consumer groups, at-least-once + dedupe"
requires-python = ">=3.12"
dependencies = [
    "redis>=5.0",
    "python-ulid>=2.5",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["spykt_eventbus"]
