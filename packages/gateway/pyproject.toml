[project]
name = "spykt-gateway"
version = "0.0.1"
description = "Pseudonymization Gateway (01-TECH_SPEC §7) — mandatory on the Anthropic client path; compliance-critical"
requires-python = ">=3.12"
dependencies = [
    "spacy>=3.8",
    "en-core-web-sm @ https://github.com/explosion/spacy-models/releases/download/en_core_web_sm-3.8.0/en_core_web_sm-3.8.0-py3-none-any.whl",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.metadata]
allow-direct-references = true

[tool.hatch.build.targets.wheel]
packages = ["spykt_gateway"]
