# Single source of truth for model strings (01-TECH_SPEC §4.3 / GAP-11).
# Swapping a model is a config change here + a mandatory eval run (CI gate) — never a code change.

models:
  fable: claude-fable-5
  opus: claude-opus-4-8
  sonnet: claude-sonnet-4-6
  haiku: claude-haiku-4-5-20251001
  embeddings: voyage-3-large

embeddings:
  dimensions: 1536

# Per-agent default routing (01-TECH_SPEC §4). Fallback chains are enforced in
# packages/anthropic-client middleware (Phase 1), reading this file.
routing:
  orchestrator: sonnet
  zuzu_live: sonnet
  zuzu_nudge: haiku
  genome_scorer: fable
  pathway_planner_weekly: fable
  pathway_planner_amendment: sonnet
  opportunity_scout: sonnet
  spike_money: sonnet
  evidence_curator: haiku
  narrative_architect: fable
  sentinel: haiku
  verifier: fable

fallbacks:
  fable: opus   # refusal / budget / availability → degrade with flag (01 §4.1)

# Pricing ($ per MTok in/out) for the budget guard's pre-flight estimate (01 §4.1.3).
# Fable pricing is from PRD §10; others are current list prices — config, adjust freely.
pricing:
  fable: { input: 10.0, output: 50.0 }
  opus: { input: 15.0, output: 75.0 }
  sonnet: { input: 3.0, output: 15.0 }
  haiku: { input: 1.0, output: 5.0 }

# Helicone-enforced per-student monthly ceilings, USD (PRD §10). Budgets are config, not code.
budgets:
  fable: 28.0
  sonnet: 9.0
  haiku: 1.0

